<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-Player Digital Art Quiz</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
      width: 100%;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .player {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #333;
    }

    .player1 {
      background-color: #FFD1DC; /* pastel pink */
    }

    .player2 {
      background-color: #B0E0E6; /* pastel blue */
    }

    h2 {
      font-size: 2em;
      margin-bottom: 10px;
    }

    .score {
      font-size: 1.5em;
      margin-bottom: 20px;
    }

    .question {
      font-size: 1.3em;
      margin-bottom: 20px;
      text-align: center;
      min-height: 60px;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 80%;
    }

    .answers button {
      padding: 15px;
      font-size: 1.2em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .answers button:hover {
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .answers button {
        font-size: 1em;
        padding: 12px;
      }
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="player player1">
      <h2 id="player1-name">Player 1</h2>
      <div class="score" id="player1-score">Score: 0</div>
      <div class="question" id="player1-question">Question will appear here</div>
      <div class="answers" id="player1-answers"></div>
    </div>

    <div class="player player2">
      <h2 id="player2-name">Player 2</h2>
      <div class="score" id="player2-score">Score: 0</div>
      <div class="question" id="player2-question">Question will appear here</div>
      <div class="answers" id="player2-answers"></div>
    </div>
  </div>

  <script>
    // Quiz questions
    const questions = [
      { question: "Which type of art uses electronic and mechanical devices instead of traditional hand techniques to create images and effects?", options: ["Digital Art","Mobile Phone Art","Digital Photography","Digital Painting"], answer: "Digital Art" },
      { question: "Which art form allows you to create original works using a smartphone or tablet, combining images, text, sound, and simple animations?", options: ["Digital Art","Mobile Phone Art","Digital Photography","Digital Painting"], answer: "Mobile Phone Art" },
      { question: "Which art type captures images using cameras or devices with built-in cameras like smartphones and tablets?", options: ["Digital Art","Mobile Phone Art","Digital Photography","Digital Painting"], answer: "Digital Photography" },
      { question: "Which art form blends traditional painting mediums with modern digital tools, allowing modification and sharing digitally?", options: ["Digital Art","Mobile Phone Art","Digital Photography","Digital Painting"], answer: "Digital Painting" },
      { question: "Which form of art is a broad category that includes creating images on devices like laptops, tablets, or smartphones, including illustrations, image manipulation, and effects?", options: ["Digital Art","Mobile Phone Art","Digital Photography","Digital Painting"], answer: "Digital Art" }
    ];

    // Shuffle function
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // Player objects with shuffled questions
    const player1 = { name: "Player 1", score: 0, questionIndex: 0, questions: shuffleArray([...questions]) };
    const player2 = { name: "Player 2", score: 0, questionIndex: 0, questions: shuffleArray([...questions]) };

    function displayQuestion(player, questionElemId, answersElemId, scoreElemId) {
      const questionElem = document.getElementById(questionElemId);
      const answersElem = document.getElementById(answersElemId);
      const scoreElem = document.getElementById(scoreElemId);

      if (player.questionIndex >= 5) {
        questionElem.textContent = "Finished!";
        answersElem.innerHTML = "";
        return;
      }

      const currentQ = player.questions[player.questionIndex];
      questionElem.textContent = currentQ.question;
      answersElem.innerHTML = "";

      currentQ.options.forEach(option => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.addEventListener("click", () => {
          if (option === currentQ.answer) {
            player.score += 2;
            scoreElem.textContent = `Score: ${player.score}`;
          }
          player.questionIndex += 1;
          displayQuestion(player, questionElemId, answersElemId, scoreElemId);
        });
        answersElem.appendChild(btn);
      });
    }

    // Initialize
    displayQuestion(player1, "player1-question", "player1-answers", "player1-score");
    displayQuestion(player2, "player2-question", "player2-answers", "player2-score");

  </script>
</body>
</html>
